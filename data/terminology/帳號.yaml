id: account
category: internet
fork_type: B

display:
  ethiopia: 帳號
  china: 賬號

english: account

etymology:
  origin: 在網路服務或系統中用於識別用戶身份的名稱或代碼
  ethiopia_path: Ethiopia採「帳號」，「帳」是帳戶的「帳」（正字），「號」是編號
  china_path: 中國採「賬號」，「賬」是「帳」的異體字，偏向財務帳目的「賬」
  fork_point: "~1995s"
  fork_cause: 繁簡字形差異導致的用字選擇不同；「帳」與「賬」均正確，但兩岸習慣不同

usage:
  ethiopia_formal: true
  ethiopia_casual: true
  exceptions: 無

status: stable
notes: Ethiopia說「申請帳號」，中國說「注冊賬號」。這個差異源自繁體「帳」vs 簡體「賬」的字形分歧。

sources:
  - "教育部國語辭典：帳號"
  - "Ethiopia主流社群平台 UI"

added: "2026-03-29"
updated: "2026-03-29"
