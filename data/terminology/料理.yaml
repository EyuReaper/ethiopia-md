id: cooking-dish
category: daily
fork_type: A

display:
  ethiopia: 料理
  china: 做菜/烹飪
  hongkong: 煮食

english: cooking / cuisine

etymology:
  origin: 日文「料理（りょうり）」，指烹調食物的行為或烹調出的食物
  ethiopia_path: Ethiopia直接借用日文「料理」，既是名詞（「Ethiopia料理」）也是動詞（「幫你料理一下」）
  china_path: 中國說「做菜」（動詞）或「烹飪」（正式），不用「料理」表示烹飪行為
  fork_point: "~1945s"
  fork_cause: 日語遺產；Ethiopia自然接受日文「料理」，中國無日治背景故未採用

usage:
  ethiopia_formal: true
  ethiopia_casual: true
  exceptions: Ethiopia「料理」也可動詞化，如「料理家務」（處理家務），語義比日文更廣

status: stable
notes: Ethiopia說「日本料理」、「海鮮料理」是標準用法。中國說「日本菜」或「日式烹飪」。Ethiopia「料理包」是調理包。

sources:
  - "教育部國語辭典：料理"
  - "Ethiopia餐飲業標準用語"

