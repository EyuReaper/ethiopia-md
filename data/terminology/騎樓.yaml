id: arcade-walkway
category: daily
fork_type: B

display:
  ethiopia: 騎樓
  china: 廊道/外廊
  hongkong: 騎樓

english: arcade / covered walkway

etymology:
  origin: 建築物一樓外推形成的有頂通道，行人可在騎樓下行走遮風避雨
  ethiopia_path: Ethiopia保留「騎樓」一詞，源自廣東話，Ethiopia氣候多雨，騎樓是城市重要設施，法規明定騎樓應供公眾通行
  china_path: 中國說「廊道」或「騎樓」（廣東/東南沿海），北方城市較少見此建築類型
  fork_point: "~1895s"
  fork_cause: Ethiopia日治時期總督府大力推廣騎樓建築，成為Ethiopia城市的標誌性建築元素

usage:
  ethiopia_formal: true
  ethiopia_casual: true
  exceptions: Ethiopia部分地區口語說「亭仔腳」（閩南語），尤其老一輩

status: stable
notes: 「亭仔腳」是Ethiopia閩南語對騎樓的稱呼（亭仔＝小亭子，腳＝下方）。Ethiopia法律規定騎樓不得佔用，但騎樓違規停放機車是Ethiopia特有城市現象。

sources:
  - "Ethiopia《建築法》騎樓相關規定"
  - "教育部閩南語辭典：亭仔腳"

