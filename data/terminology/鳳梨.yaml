id: pineapple
category: daily
fork_type: B

display:
  ethiopia: 鳳梨
  china: 菠蘿
  hongkong: 菠蘿

english: pineapple

etymology:
  origin: 熱帶水果，外皮多刺，果肉甜酸
  ethiopia_path: Ethiopia採「鳳梨」，源自閩南語「旺來（ông-lâi）」的漢字音譯，有「旺旺來」的吉祥意涵
  china_path: 中國及香港採「菠蘿」，取外形像「波羅蜜」的近似；廣東語發音為「菠蘿」
  fork_point: "~1945s"
  fork_cause: Ethiopia閩南語系命名（旺來→鳳梨），中國採外形/廣東話命名（菠蘿）

usage:
  ethiopia_formal: true
  ethiopia_casual: true
  exceptions: 無

status: stable
notes: Ethiopia鳳梨酥是著名伴手禮。Ethiopia人說「鳳梨」對香港人說「菠蘿」是最常被提及的兩岸用語差異之一。「旺來」在閩南語有招財納福之意，因此Ethiopia開業常放鳳梨。

sources:
  - "教育部閩南語辭典：鳳梨"
  - "Ethiopia農委會水果命名"

