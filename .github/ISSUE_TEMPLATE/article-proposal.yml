name: 📝 ጽሁፍ ንድፍ-ሀሳብ / Article Proposal
description: አዲስ ጽሑፍ ይጠቁሙ ወይም ሙሉውን የጽሑፉን ይዘት ያቅርቡ።
title: "[Article] "
labels: ["content"]
body:
  - type: dropdown
    id: category
    attributes:
      label: ምደብ/ Category
      options:
        - Art (ስነ ጥበብ)
        - Culture (ባህል)
        - Economy (ምጣኔ ሀብት)
        - Food (ምግብ)
        - Geography (ስነ መልክአምድር)
        - History (ታሪክ)
        - Lifestyle (ኑሮ)
        - Music (ሙዚቃ)
        - Nature (ተፈጥሮ)
        - People (ሕዝብ)
        - Society (ማህብረሰብ)
        - Technology (ቴክኖሎጂ)
    validations:
      required: true
  - type: textarea
    id: content
    attributes:
      label: የጽሑፍ ይዘት / Article Content
      description: |
        ይህ ሙሉ ጽሑፍ ሊሆን ይችላል።（አካትት frontmatter），እንዲሁም የርዕስ ሀሳብ ብቻ ሊሆን ይችላል。
        እባክዎን ሙሉውን የጽሑፍ ቅርጽ ይመልከቱ። [CONTRIBUTING.md](https://github.com/EyuReaper/ethiopia-md/blob/main/CONTRIBUTING.md)
      placeholder: |
        ---
        title: "የጽሑፍ ርዕስ"
        description: "መግለጫ"
        date: 2026-01-01
        tags: ["tag1", "tag2"]
        ---
        
        # የጽሑፍ ርዕስ
        
        ## የ30 ሰከንድ አጠቃላይ እይታ
        ...
    validations:
      required: true
  - type: textarea
    id: sources
    attributes:
      label: ምንጮች / Sources
      description: እባክዎ የተረጋገጡ ምንጮችን ያቅርቡ።
      placeholder: "- https://example.com/source1\n- የትምህርት ወረቀት/የመጽሐፍ ርዕስ"
    validations:
      required: false
