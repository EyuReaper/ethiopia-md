name: 🔍 የእውነታ ማስተካከያ / Fact Correction
description: በጽሑፉ ውስጥ የተሳሳቱ ወይም ጊዜ ያለፈባቸው መረጃዎችን ይጥቀሱ።
title: "[Fact Check] "
labels: ["needs-verification"]
body:
  - type: input
    id: article
    attributes:
      label: የትኛው ጽሑፍ?/ Which article?
      description: የጽሑፍ ርዕስ ወይም URL
      placeholder: "ለምሳሌ፡- የኢትዮጵያ የኦሮሞ ባህል ወይም https://ethiopia.md/people/oromo"
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: ምንድነው ችግሩ? / What's wrong?
      description: እባክዎ ስህተቱን ይግለጹ እና ትክክለኛውን መረጃ ምንጭ ያቅርቡ።
      placeholder: |
        የተሳሳተ ይዘት፡ "XXX በ1990 ሽልማት አግኝቷል።"」
        ትክክለኛ መረጃ፡ "XXX ሽልማቱን የተቀበለው በ1993 ነው።"」
        ምንጭ፡ https://...
    validations:
      required: true
