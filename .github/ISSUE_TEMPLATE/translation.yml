name: 🌐 የትርጉም ማስገባት Translation Submission
description: የተተረጎመውን ጽሑፍ ያስገቡ（አይሆንም Git እንዲሁም አስተዋጽዖ ያድርጉ！）
title: "translate({የቋንቋ ኮድ}): {የአማርኛ ዓረፍተ ነገር ስም} → {የእንግሊዝኛ ፋይል ስም}"
labels: ["translation"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🌐 የትርጉም አቀራረብ

        እናመሰግናለን! በ AI እንዲሁም በኢትዮጵያ ቋንቋ ለማድረግ! የተተረጎመውን ጽሑፍ ያስገቡ፣ ጠባቂው እንዲቀይሩት ይረዳዎታል PR。

        > 💡 ከፈለጉ Git，በቀጥታ ለመክፈት ይሞክራል PR — ፈጣን merge！

  - type: dropdown
    id: language
    attributes:
      label: የትርጉም ቋንቋ Target Language
      options:
        - 🇬🇧 English (en)
        - 🇪🇸 Español (es)
        - 🇯🇵 日本語 (ja)
        - 🇰🇷 한국어 (ko)
        - 🇫🇷 Français (fr)
        - 🇩🇪 Deutsch (de)
        - 🇻🇳 Tiếng Việt (vi)
        - 🇵🇹 Português (pt)
        - 🇹🇭 ไทย (th)
        - 🇮🇩 Bahasa Indonesia (id)
        - Other（እባክዎን ከዚህ በታች ያብራሩ）
    validations:
      required: true

  - type: input
    id: source-article
    attributes:
      label: ዋና ጽሑፍ Source Article
      description: የትኛውን የአማርኛ ጽሑፍ ነው የምትተረጉመው?
      placeholder: "ምሳሌዎች፡- የኢትዮጵያ ቡና ፣  ቱሪዝም ፣ የኢትዮጵያ ዲሞክራሲያዊ አሰራር"
    validations:
      required: true

  - type: input
    id: file-path
    attributes:
      label: የተጠቆመ የፋይል መንገድ Suggested File Path
      description: "ቅርጸት：knowledge/{lang}/{Category}/{slug}.md"
      placeholder: "ለምሳሌ：knowledge/ja/Food/bubble-tea.md"
    validations:
      required: false

  - type: textarea
    id: translation-content
    attributes:
      label: የተተረጎመ ይዘት Translation Content
      description: |
        ሙሉውን የ.md ፋይል ይዘት ይለጥፉ (ይይዛል frontmatter)。
        AI ትርጉምን ከተጠቀሙ, ጥራቱን ለማረጋገጥ በመጀመሪያ እራስዎን ለማንበብ ይመከራል::
      placeholder: |
        ---
        title: 'bunna'
        description: '...'
        date: 2026-03-23
        tags: [food, bunna]
        category: Food
        author: 'Ethiopia.md Translation Team'
        ---

        # bunna

        ...
      render: markdown
    validations:
      required: true

  - type: dropdown
    id: ai-tool
    attributes:
      label:  AI መሳሪያ ተጠቅሟል  AI Tool Used
      options:
        - Claude
        - ChatGPT
        - Gemini
        - Copilot
        - Other
        - የሰው ትርጉም ( AI የለም)
    validations:
      required: true

  - type: dropdown
    id: native-speaker
    attributes:
      label: የዚህ ቋንቋ ተወላጅ ነዎት? Are you a native speaker?
      options:
        - ✅ አዎ Yes
        - ❌ አይ No
        - 🔄 ለአፍ መፍቻ ቋንቋ ቅርብ Near-native
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: አስተያየት Notes
      description: በትርጉም ውስጥ ያጋጠሙ ችግሮች, ልዩ ትኩረት የሚሹ ቦታዎች, ወዘተ ።
      placeholder: "ምሳሌ፡- አንዳንድ ኢትዮጵያዊ-ተኮር ፅንሰ-ሀሳቦች ለመተርጎም አስቸጋሪ ናቸው፣ስለዚህ እነሱን ለመቋቋም XXX ተጠቅሜያለሁ።"
    validations:
      required: false
